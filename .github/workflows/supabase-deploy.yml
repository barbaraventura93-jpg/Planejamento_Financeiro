name: Aplicar migrations no Supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    # os secrets foram cadastrados dentro do Environment "SUPABASE_ACCESS_TOKEN"
    # (Settings > Environments), não como Repository secret — por isso o job
    # precisa rodar nesse environment pra enxergá-los.
    environment: SUPABASE_ACCESS_TOKEN
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link do projeto
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Marcar baseline (0001) como já aplicada, sem rodar de novo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase migration repair --status applied 0001

      - name: Aplicar migrations pendentes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push
